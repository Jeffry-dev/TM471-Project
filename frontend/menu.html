<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cedars of Lebanon — Menu</title>
  <link rel="icon" type="image/jpeg" href="assets/media/site-logo-chef.jpg" />
  <link rel="stylesheet" href="global.css" />
</head>
<body>
  <!-- Header / Navbar -->
  <header id="app-header" class="sticky top-0 z-20 border-b border-subtle bg-transparent">
    <nav id="app-nav" class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4">
      <a href="home.html" class="text-lg font-semibold tracking-tight text-[var(--text-main)]">
        <span class="rounded-full bg-[var(--accent)] px-2 py-0.5 text-xs font-bold uppercase tracking-[0.2em] text-[var(--bg)] mr-2">🌲</span>
        Cedars of Lebanon
      </a>
      <div class="flex items-center gap-3 text-sm font-medium text-muted-soft">
        <a class="nav-item" data-nav-link href="home.html">Home</a>
        <a class="nav-item" data-nav-link href="menu.html">Menu</a>
        <a class="nav-item" data-nav-link href="about.html">About</a>
        <a class="nav-item" data-nav-link href="contact.html">Contact</a>
        <span id="auth-slot"></span>
      </div>
    </nav>
  </header>

  <main class="bg-transparent">
    <div class="mx-auto max-w-7xl px-4 py-10">
      <header class="mb-8">
        <div>
          <p class="text-xs font-semibold uppercase tracking-[0.2em] text-[var(--accent)]">Our Kitchen</p>
          <h1 class="mt-2 text-3xl font-bold tracking-tight">Lebanese Menu</h1>
          <p class="mt-2 text-sm text-muted-soft">Explore authentic Lebanese dishes from fresh mezze to charcoal-grilled specialties.</p>
        </div>
        <div class="mt-6 grid gap-3 md:grid-cols-[minmax(0,1fr)_auto] md:items-center">
          <div>
            <label for="menu-search" class="sr-only">Search dishes</label>
            <input
              id="menu-search"
              type="search"
              placeholder="Search by dish name..."
              class="w-full rounded-md border border-subtle bg-transparent px-3 py-2 text-sm shadow-sm focus:border-[var(--accent)] focus:outline-none"
            />
            <p id="menu-results-summary" class="mt-2 text-xs text-muted-soft"></p>
          </div>

          <div class="mt-6 flex flex-wrap gap-2" aria-label="Menu category filters"></div>
        </div>
      </header>

      <div id="menu-section" class="space-y-10">
        <p class="text-muted-soft">Loading…</p>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-subtle surface-subtle backdrop-blur-sm">
    <div class="mx-auto flex max-w-6xl flex-wrap items-center justify-between gap-2 px-4 py-4 text-xs text-muted-soft">
      <span>© 2026 Cedars of Lebanon. All rights reserved.</span>
      <span class="flex items-center gap-1">
        <span class="h-1 w-1 rounded-full bg-[var(--accent-secondary)]"></span>
        <span>Crafted with Laravel & SQLite.</span>
      </span>
    </div>
  </footer>

  <script src="global.js"></script>
  <script src="assets/js/menu.js"></script>
</body>
</html>
